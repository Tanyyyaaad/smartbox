{% extends "base.html" %}
{% block content %}
<h2>Новая коробка</h2>
<form method="post">
    <input type="text" name="name" placeholder="Название коробки (например, Зимняя одежда)" required>
    <textarea name="content" rows="5" placeholder="Содержимое (через запятую)" required></textarea>
    <label>Цвет коробки:</label>
    <input type="color" name="color" value="#4CAF50">
    <button type="submit">Создать и скачать QR-код</button>
</form>
{% endblock %}
