{% extends "base.html" %}
{% block content %}
<h2>Результаты поиска: {{ query }}</h2>
{% if results %}
    {% for box in results %}
        <div class="box-card" style="border-left: 8px solid {{ box.color }};">
            <h3>{{ box.name }}</h3>
            <p>{{ box.content }}</p>
            <a href="{{ url_for('view_box', box_id=box.id) }}">Открыть коробку</a>
        </div>
    {% endfor %}
{% else %}
    <p>Ничего не найдено.</p>
{% endif %}
<a href="{{ url_for('dashboard') }}">← Назад</a>
{% endblock %}
