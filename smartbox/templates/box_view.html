{% extends "base.html" %}
{% block content %}
<div style="background: white; border-radius: 16px; padding: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.05);">
    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px;">
        <div style="width: 40px; height: 40px; background: {{ box.color }}; border-radius: 12px;"></div>
        <h2 style="margin:0;">📦 {{ box.name }}</h2>
    </div>

    {% if box.photos %}
        <!-- Галерея всех фото -->
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px;">
            {% for photo in box.photos %}
                <img src="{{ url_for('uploaded_file', filename=photo.filename) }}" 
                     style="width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; border: 1px solid #eee;">
            {% endfor %}
        </div>
    {% endif %}

    <p style="font-size: 1.2rem; margin-bottom: 30px;">{{ box.content }}</p>
    <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 20px;">
        <span><strong>Владелец:</strong> {{ owner.username }}</span>
        <span class="text-muted">Коробка №{{ box.box_number }} у пользователя</span>
    </div>
</div>
<p style="margin-top: 20px;"><a href="javascript:history.back()">← Назад</a></p>
{% endblock %}
