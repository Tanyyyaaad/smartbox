<!DOCTYPE html>
<html>
<head>
    <title>Содержимое коробки</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; padding: 2rem; text-align: center; }
        .box { background: #f9f9f9; border-radius: 1rem; padding: 2rem; max-width: 500px; margin: 0 auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #4CAF50; }
    </style>
</head>
<body>
    <div class="box">
        <h1>📦 {{ name }}</h1>
        <p><strong>Что внутри:</strong></p>
        <p>{{ content }}</p>
        <small>ID коробки: {{ box_id }}</small>
    </div>
</body>
</html>
