<!DOCTYPE html>
<html>
<head>
    <title>Создать коробку</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; }
        input, textarea, button { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #4CAF50; color: white; font-size: 1.2rem; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>📦 Новая коробка</h1>
    <form method="post">
        <input type="text" name="name" placeholder="Название коробки (например, Зимняя одежда)" required>
        <textarea name="content" rows="5" placeholder="Что внутри? (например, шапка, шарф, перчатки)" required></textarea>
        <button type="submit">Создать и скачать QR-код</button>
    </form>
    <p><a href="/">← На главную</a></p>
</body>
</html>
