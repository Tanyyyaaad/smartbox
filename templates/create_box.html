{% extends "base.html" %}
{% block content %}
<h2>➕ Новая коробка</h2>
<form method="post" enctype="multipart/form-data">
    <label>Название коробки</label>
    <input type="text" name="name" required placeholder="Например, «Зимние вещи»">

    <label>Содержимое</label>
    <textarea name="content" rows="4" required placeholder="Куртка, шапка, перчатки..."></textarea>

    <label>Цвет коробки</label>
    <input type="color" name="color" value="#e0e0e0">

    <label>Фото коробки (необязательно)</label>
    <input type="file" name="photo" accept="image/*">

    <button type="submit">Создать и скачать QR‑код</button>
</form>
{% endblock %}
